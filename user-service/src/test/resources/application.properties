spring.application.name=user-service

spring.datasource.url=jdbc:h2:mem:user-service-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway migration la MySQL-specific, dung ddl-auto cho test tren H2
spring.flyway.enabled=false

# Khong can Eureka / RabbitMQ khi chay test
eureka.client.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false

# --- Mail (test) — chi de tao bean JavaMailSender cho context load, khong gui that ---
spring.mail.host=localhost
spring.mail.port=3025

# --- URL frontend (test) ---
app.frontend-url=http://localhost:3000

# --- JWT (test) ---
app.jwt.secret=ZGVmYXVsdC1kb2N1aHViLXNlY3JldC1jaGFuZ2UtbWUtMzJieXRlcyE=
app.jwt.expiration-ms=86400000

# --- Token noi bo (test) ---
app.internal.token=test-internal-token
