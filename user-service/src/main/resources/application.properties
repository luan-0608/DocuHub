spring.application.name=user-service
server.port=8081

# --- MySQL (database rieng cua user-service) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/docuhub_user?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:docuhub}

# --- JPA ---
# Flyway la nguon chuan cua schema; JPA khong tu sinh/validate de tranh xung dot
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true

# --- Eureka ---
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# --- RabbitMQ (phat su kien user.deleted) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:docuhub}
spring.rabbitmq.password=${RABBITMQ_PASS:docuhub}

# --- Mail (SMTP gui email dat lai mat khau) ---
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- URL frontend (build link reset password trong email) ---
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# --- JWT (secret dung chung toan he thong de moi service tu verify duoc) ---
app.jwt.secret=${JWT_SECRET:ZGVmYXVsdC1kb2N1aHViLXNlY3JldC1jaGFuZ2UtbWUtMzJieXRlcyE=}
app.jwt.expiration-ms=86400000

# --- Token noi bo service-to-service (bao ve /internal/**) ---
app.internal.token=${INTERNAL_TOKEN:docuhub-internal-dev-token}

# --- Tai khoan admin seed khi khoi dong (de trong email/password thi bo qua) ---
app.admin.email=${ADMIN_EMAIL:admin@docuhub.vn}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.full-name=${ADMIN_NAME:}

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Actuator (Docker healthcheck) ---
management.endpoints.web.exposure.include=health,info
# Khong dua SMTP vao health: chua dien SMTP_PASS thi container van phai healthy
management.health.mail.enabled=false
