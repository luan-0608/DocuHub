spring.application.name=document-service
server.port=8082

# --- MySQL (database rieng cua document-service) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/docuhub_document?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:docuhub}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true

# --- Eureka ---
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# --- RabbitMQ (phat document.uploaded/deleted, nghe user.deleted) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:docuhub}
spring.rabbitmq.password=${RABBITMQ_PASS:docuhub}
# Message loi thi KHONG tra lai queue (tranh vong lap doc message vo han)
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# --- Storage: local (mac dinh, luu o dia / volume Docker) hoac cloudinary (cloud) ---
# Gia tri that dat trong .env (gitignore) — KHONG dan secret vao file nay vi se commit len git
app.storage.provider=${STORAGE_PROVIDER:local}
app.storage.local.dir=${STORAGE_DIR:uploads}
# Chuoi ket noi lay o Dashboard Cloudinary, dang: cloudinary://api_key:api_secret@cloud_name
app.storage.cloudinary.url=${CLOUDINARY_URL:}

# --- File upload ---
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# --- JWT (secret dung chung de verify token do user-service phat hanh) ---
app.jwt.secret=${JWT_SECRET:ZGVmYXVsdC1kb2N1aHViLXNlY3JldC1jaGFuZ2UtbWUtMzJieXRlcyE=}

# --- Token noi bo service-to-service (bao ve /internal/**) ---
app.internal.token=${INTERNAL_TOKEN:docuhub-internal-dev-token}

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Actuator (Docker healthcheck) ---
management.endpoints.web.exposure.include=health,info
