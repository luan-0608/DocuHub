# Test dung H2 in-memory gia lap MySQL, khong can hatang ngoai
spring.datasource.url=jdbc:h2:mem:document-service-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Khong ket noi Eureka / RabbitMQ khi chay test
eureka.client.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false

app.jwt.secret=dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQhIQ==
app.internal.token=test-internal-token

app.storage.local.dir=${java.io.tmpdir}/docuhub-test-uploads
