spring.application.name=api-gateway
server.port=8080

# --- Eureka: tra dia chi cac service theo ten de dinh tuyen lb:// ---
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# --- JWT secret dung chung: gateway chi XAC MINH som roi tu choi request rac,
#     tung service van tu xac thuc lai (defense in depth) ---
app.jwt.secret=${JWT_SECRET:ZGVmYXVsdC1kb2N1aHViLXNlY3JldC1jaGFuZ2UtbWUtMzJieXRlcyE=}

# --- Actuator (Docker healthcheck) ---
management.endpoints.web.exposure.include=health,info
