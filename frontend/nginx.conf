server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Upload toi da 20MB (multipart 25MB phia service) — nginx mac dinh chi 1MB
    client_max_body_size 25m;

    # File tinh co ma bam trong ten (index-abc123.js) -> cache vinh vien
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html KHONG duoc cache: moi lan deploy trinh duyet phai lay ban moi
    # (neu khong, tinh nang moi khong hien du da build lai — phai Ctrl+F5 thu cong)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA: route nao khong khop file tinh thi tra ve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Chuyen tiep API sang gateway (ten service trong mang docker compose)
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
