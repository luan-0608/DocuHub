spring.application.name=chat-service
server.port=8083

# --- MySQL (database rieng cua chat-service) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3309/docuhub_chat?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:docuhub}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true

# --- Eureka ---
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# --- RabbitMQ (nghe document.uploaded/deleted, user.deleted) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:docuhub}
spring.rabbitmq.password=${RABBITMQ_PASS:docuhub}
# Message loi thi KHONG tra lai queue (tranh vong lap doc message vo han)
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# --- Feign goi document-service (tai file 20MB nen read-timeout rong rai) ---
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=60000

# --- JWT (secret dung chung de verify token do user-service phat hanh) ---
app.jwt.secret=${JWT_SECRET:ZGVmYXVsdC1kb2N1aHViLXNlY3JldC1jaGFuZ2UtbWUtMzJieXRlcyE=}

# --- Token noi bo service-to-service (gan vao request Feign) ---
app.internal.token=${INTERNAL_TOKEN:docuhub-internal-dev-token}

# --- Embedding cho RAG (chuan OpenAI, doi base-url de dung ben thu 3 tuong thich) ---
# Khong co key thi he thong van chay, chi tinh nang AI bao loi huong dan cau hinh.
embedding.api-key=${EMBEDDING_API_KEY:}
embedding.base-url=${EMBEDDING_BASE_URL:https://api.openai.com/v1}
embedding.model=${EMBEDDING_MODEL:text-embedding-3-large}

# --- Chat LLM cho RAG (provider: openai = chuan OpenAI/ben thu 3 tuong thich, gemini) ---
llm.provider=${LLM_PROVIDER:openai}
llm.api-key=${LLM_API_KEY:}
llm.base-url=${LLM_BASE_URL:https://api.openai.com/v1}
llm.chat-model=${LLM_CHAT_MODEL:gpt-4o-mini}

# --- RAG indexing ---
rag.chunk-size=3000
rag.chunk-overlap=100
# So doan (chunk) nap vao ngu canh moi cau hoi. Tang de AI it bo sot thong tin,
# nhung dung qua cao keo vuot gioi han ngu canh model / ton token (chunk ~3000 ky tu).
rag.top-k=6

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Actuator (Docker healthcheck) ---
management.endpoints.web.exposure.include=health,info
