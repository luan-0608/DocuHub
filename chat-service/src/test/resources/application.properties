# Test dung H2 in-memory gia lap MySQL, khong can ha tang ngoai
spring.datasource.url=jdbc:h2:mem:chat-service-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Khong ket noi Eureka / RabbitMQ khi chay test
eureka.client.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false

app.jwt.secret=dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQhIQ==
app.internal.token=test-internal-token

# AI config gia — test khong goi API that
embedding.api-key=test-key
embedding.base-url=http://localhost:9999/v1
embedding.model=text-embedding-3-small
llm.provider=openai
llm.api-key=test-key
llm.base-url=http://localhost:9999/v1
llm.chat-model=gpt-test

rag.chunk-size=800
rag.chunk-overlap=100
rag.top-k=4
